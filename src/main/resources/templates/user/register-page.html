<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}"
          rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <title>Register</title>

</head>
<body>

    <section class="vh-100" style="background-color: #eee;">
       <div class="container vh-100">
           <div class="row d-flex h-100">
                <div class="col-lg-12 col-xl-11">
                    <div class="card text-black" style="border-radius: 25px">
                        <div class="card-body p-md-5">
                            <div class="row justify-content-center">
                                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                                    <h2 class="text-center mx-1 mx-md-4">Sign up</h2>
                                    <form action="#" th:action="@{/register}" th.object="${user}" class="mx-1 mx-md-4" method="post">
                                        <div class="d-flex flex-row align-items-center">
                                            <div class="mb-0">
                                                <label class="form-label">First Name</label>
                                                <input type="text" class="form-control" required>
                                            </div>

                                        </div>
                                        <div class="d-flex">
                                            <div class="mb-0">
                                                <label class="form-label">Middle Name</label>
                                                <input type="text" class="form-control">
                                            </div>

                                        </div>
                                        <div class="d-flex">
                                            <div class="mb-0">
                                                <label class="form-label">Last Name</label>
                                                <input type="text" class="form-control">
                                            </div>

                                        </div>
                                        <div class="d-flex">
                                            <div class="mb-0">
                                                <label class="form-label">Your Email</label>
                                                <input type="email" class="form-control">
                                            </div>

                                        </div>
                                        <div class="d-flex">
                                            <div class="mb-0">
                                                <label class="form-label">Phone Mobile</label>
                                                <input type="number" class="form-control">
                                            </div>

                                        </div>
                                        <div class="d-flex">
                                            <div class="mb-0">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                        </div>
                                        <div class="d-flex">
                                            <div class="mb-0">
                                                <label class="form-label">Repeat your password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                        </div>
                                        <div class="form-check d-flex justify-content-center ">
                                            <input class="form-check-input me-2" type="checkbox" value=""
                                                   id="form2Example3c"/>
                                            <label class="form-check-label" for="form2Example3c">
                                                I agree all statements in <a href="#!">Terms of service</a>
                                            </label>

                                        </div>
                                        <div class="mb-3 d-flex justify-content-center">
                                            <small >You already have an account? <a href="/login-form">Log in</a> </small>
                                        </div>
                                        <div class="d-flex justify-content-center ">
                                            <button class="btn btn-primary ">Register</button>
                                        </div>

                                    </form>
                                </div>

                                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                                    <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                                         class="img-fluid" alt="Sample image">
                                </div>

                            </div>
                        </div>

                    </div>
                </div>



           </div>
       </div>


    </section>



</body>
</html>
